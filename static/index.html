<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keystroke Dynamics</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <h1>Keystroke Dynamics</h1>
  <p class="subtitle">Type a sentence → we learn your typing rhythm → identify you later</p>

  <!-- REGISTER -->
  <div class="card">
    <h2>1. Register</h2>
    <input type="text" id="username" placeholder="Your name" />
    <textarea id="registerText" placeholder="Type anything here..."></textarea>
    <button id="registerBtn">Register & Train</button>
    <p id="status"></p>
  </div>

  <!-- IDENTIFY -->
  <div class="card">
    <h2>2. Identify</h2>
    <textarea id="testText" placeholder="Type anything here..."></textarea>
    <button id="predictBtn">Who am I?</button>
    <p id="result"></p>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
