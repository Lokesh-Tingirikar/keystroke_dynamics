<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keystroke Dynamics — 1D CNN Demo</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* General styles                                                      */
    /* ------------------------------------------------------------------ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #333;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.6rem;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    /* ------------------------------------------------------------------ */
    /* Card panels                                                         */
    /* ------------------------------------------------------------------ */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
      margin-bottom: 16px;
      font-size: 1.15rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #4a90d9;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      display: inline-block;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #4a90d9;
      color: #fff;
    }

    .btn-primary:hover {
      background: #357abd;
    }

    .btn-secondary {
      background: #6c757d;
      color: #fff;
    }

    .btn-secondary:hover {
      background: #565e64;
    }

    /* ------------------------------------------------------------------ */
    /* Result box                                                          */
    /* ------------------------------------------------------------------ */
    #result {
      margin-top: 16px;
      padding: 16px;
      border-radius: 8px;
      background: #f8f9fa;
      font-size: 1rem;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #555;
    }

    #result.success {
      background: #d4edda;
      color: #155724;
    }

    #result.warning {
      background: #fff3cd;
      color: #856404;
    }

    #status {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #888;
      text-align: center;
    }

    /* ------------------------------------------------------------------ */
    /* Prompt display (MonkeyType-style)                                   */
    /* ------------------------------------------------------------------ */
    .prompt-box {
      background: #1e1e2e;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 14px;
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      font-size: 1.15rem;
      line-height: 1.8;
      letter-spacing: 0.3px;
      user-select: none;
      min-height: 70px;
      word-wrap: break-word;
    }

    .prompt-box .char {
      color: #585b70;
      transition: color 0.08s;
    }

    .prompt-box .char.correct {
      color: #a6e3a1;
    }

    .prompt-box .char.incorrect {
      color: #f38ba8;
      text-decoration: underline;
    }

    .prompt-box .char.current {
      border-left: 2px solid #cdd6f4;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    /* Progress bar */
    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.82rem;
      color: #888;
    }

    .progress-bar-track {
      flex: 1;
      height: 6px;
      background: #e9ecef;
      border-radius: 3px;
      margin: 0 12px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a90d9, #6dd5ed);
      border-radius: 3px;
      transition: width 0.15s;
    }

    .prompt-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .btn-icon {
      background: none;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.82rem;
      color: #555;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-icon:hover {
      background: #f0f2f5;
      border-color: #999;
    }

    .prompt-label {
      font-size: 0.82rem;
      color: #999;
      flex: 1;
      text-align: right;
    }

    /* Hide the textarea visually but keep it focusable */
    .typing-area {
      position: relative;
    }

    .typing-area textarea {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      cursor: default;
      z-index: 2;
    }

    .typing-area .prompt-box {
      cursor: text;
      position: relative;
      z-index: 1;
    }

    .done-badge {
      display: inline-block;
      background: #d4edda;
      color: #155724;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Keystroke Dynamics</h1>
    <p class="subtitle">1D CNN — User Identification Demo</p>

    <!-- ============================================================== -->
    <!-- Registration Panel                                              -->
    <!-- ============================================================== -->
    <div class="card">
      <h2>📝 Register User</h2>

      <label for="username">User Name</label>
      <input type="text" id="username" placeholder="Enter your name" />

      <label>Type the text shown below</label>
      <div class="prompt-actions">
        <button class="btn-icon" id="newRegPrompt" title="New prompt">🔄 New Prompt</button>
        <span class="prompt-label" id="regPromptLabel"></span>
      </div>
      <div class="progress-row">
        <span id="regProgress">0 / 0 chars</span>
        <div class="progress-bar-track"><div class="progress-bar-fill" id="regProgressBar"></div></div>
        <span id="regWordCount">0 words</span>
      </div>
      <div class="typing-area">
        <div class="prompt-box" id="regPromptDisplay"></div>
        <textarea id="registerText" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
      </div>

      <button class="btn-primary" id="registerBtn" style="margin-top:14px">Register &amp; Train</button>
      <div id="status">Ready</div>
    </div>

    <!-- ============================================================== -->
    <!-- Testing / Identification Panel                                  -->
    <!-- ============================================================== -->
    <div class="card">
      <h2>🔍 Identify User</h2>

      <label>Type the text shown below</label>
      <div class="prompt-actions">
        <button class="btn-icon" id="newTestPrompt" title="New prompt">🔄 New Prompt</button>
        <span class="prompt-label" id="testPromptLabel"></span>
      </div>
      <div class="progress-row">
        <span id="testProgress">0 / 0 chars</span>
        <div class="progress-bar-track"><div class="progress-bar-fill" id="testProgressBar"></div></div>
        <span id="testWordCount">0 words</span>
      </div>
      <div class="typing-area">
        <div class="prompt-box" id="testPromptDisplay"></div>
        <textarea id="testText" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
      </div>

      <button class="btn-secondary" id="predictBtn" style="margin-top:14px">Identify User</button>

      <div id="result">Type the prompt above and click "Identify User"</div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
